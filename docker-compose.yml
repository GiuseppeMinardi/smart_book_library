services:
  books_db:
    # Change this line from postgres:latest to the pgvector image
    image: pgvector/pgvector:pg16 
    container_name: library-db
    restart: always
    env_file:
      - ./db/.env
    volumes:
      - bookdatabase:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  # 2. THE API
  db_api:
    build: ./api
    container_name: books-api
    restart: always
    depends_on:
      - agentic_calls
      - books_db # <-- FIXED: This must be the service name, not container_name
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      - AGENTIC_API_URL=http://agentic_calls:8000
      - HTTP_PROXY
      - HTTPS_PROXY
      - NO_PROXY
      - ALL_PROXY
    volumes:
      - ./api:/app
    # NEW: Use the --reload flag for Uvicorn/FastAPI
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  agentic_calls:
    build: ./agents
    container_name: books-agents
    restart: always
    depends_on:
      - ollama
      - phoenix # <-- NEW: Ensure Phoenix starts before the agents
    ports:
      - "8001:8000"
    environment:
      - BASE_URL=http://ollama:11434
      # --- NEW: Tell the agent service where to send trace data ---
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006
      # Alternatively, if you use standard OTEL libraries:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://phoenix:6006/v1/traces
      # ------------------------------------------------------------
      - HTTP_PROXY
      - HTTPS_PROXY
      - NO_PROXY
      - ALL_PROXY
    env_file:
      - ./agents/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: books-frontend
    restart: always
    depends_on:
      - books_db
      - agentic_calls
    ports:
      - "8501:8501"
    environment:
      - DB_HOST=books_db
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=secretpassword
      - DB_NAME=appdb
      - AGENTIC_API_URL=http://agentic_calls:8000
    volumes:
      - ./frontend:/app
    command: streamlit run main.py --server.port 8501 --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false --server.fileWatcherType none

  # FIXED: Indentation aligned with other services
  ollama:
    build: ./ollama
    container_name: ollama
    restart: always
    ports:
      - "11436:11434"
    volumes:
      # Update the mount path to match our custom OLLAMA_MODELS environment variable
      - ollama_data:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    phoenix:
      image: arizephoenix/phoenix:latest
      container_name: arize-phoenix
      depends_on:
        books_db:
          condition: service_healthy # Wait for Postgres to be fully ready
      ports:
        - "6006:6006" # UI and OTLP HTTP
        - "4317:4317" # OTLP gRPC
      environment:
        # Tell Phoenix to use the Postgres database
        - PHOENIX_SQL_DATABASE_URL=postgresql://admin:secretpassword@books_db:5432/appdb
        # Optional: Set trace retention (0 = forever, or specify days to auto-cleanup)
        - PHOENIX_DEFAULT_RETENTION_POLICY_DAYS=0
      volumes:
        # --- NEW: Mount the volume to the working directory ---
        - phoenix_data:/phoenix/data

volumes:
  bookdatabase:
  ollama_data:
  phoenix_data: